@if (isOpen()) {
  <div
    class="task-backdrop"
    [class.task-backdrop--leaving]="isLeaving()"
    role="dialog"
    aria-modal="true"
    aria-label="Create task"
    tabindex="-1"
    (click)="close()"
    (keydown.escape)="close()"
  >
    <div
      class="task-panel"
      [class.task-panel--leaving]="isLeaving()"
      role="document"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="task-header">
        <div class="flex items-center gap-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-base-content/60"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
            />
          </svg>
          <h2 class="text-base font-semibold text-base-content">
            {{ isEditing ? 'Edit Task' : 'New Task' }}
          </h2>
        </div>
        <button
          class="btn btn-ghost btn-sm btn-circle"
          type="button"
          (click)="close()"
          aria-label="Close dialog"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="task-body">
        <!-- Error Message -->
        @if (errorMessage()) {
          <div class="alert alert-error mb-4" role="alert">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="stroke-current shrink-0 h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 14l-2-2m0 0l-2-2m2 2l2-2m-2 2l-2 2"
              />
            </svg>
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <!-- Mode Toggle -->
        <div class="task-mode-toggle" role="group" aria-label="Task type">
          <button
            type="button"
            class="task-mode-btn"
            [class.task-mode-btn--active]="mode === 'static'"
            [class.text-primary-content]="mode === 'static'"
            (click)="mode = 'static'"
          >
            Static
          </button>
          <button
            type="button"
            class="task-mode-btn"
            [class.task-mode-btn--active]="mode === 'planned'"
            (click)="mode = 'planned'"
          >
            Planned
          </button>
        </div>

        <!-- Title -->
        <div class="form-control">
          <label class="label">
            <span class="task-field-label">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5 text-base-content/50"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                />
              </svg>
              Title <span class="text-error">*</span>
            </span>
          </label>
          <input
            type="text"
            class="input input-bordered w-full"
            placeholder="Task title"
            [(ngModel)]="currentTask.title"
          />
        </div>

        <!-- Description -->
        <div class="form-control">
          <label class="label">
            <span class="task-field-label">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5 text-base-content/50"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h12M4 18h8" />
              </svg>
              Description
            </span>
          </label>
          <textarea
            class="textarea textarea-bordered w-full resize-none"
            rows="3"
            placeholder="Add a description..."
            [(ngModel)]="currentTask.description"
          ></textarea>
        </div>

        <!-- Account -->
        <div class="form-control">
          <label class="label">
            <span class="task-field-label">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5 text-base-content/50"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"
                />
              </svg>
              Account <span class="text-error">*</span>
            </span>
          </label>
          <select
            class="select select-bordered w-full"
            [(ngModel)]="currentTask.accountId"
            [disabled]="isEditing"
          >
            @for (account of accountOptions; track account.id) {
              <option [value]="account.id">{{ account.displayName }}</option>
            }
          </select>
        </div>

        <!-- Difficulty -->
        <div class="form-control">
          <label class="label">
            <span class="task-field-label">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5 text-base-content/50"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M13 10V3L4 14h7v7l9-11h-7z"
                />
              </svg>
              Difficulty
            </span>
          </label>
          <select class="select select-bordered w-full" [(ngModel)]="currentTask.difficulty">
            @for (level of difficultyOptions; track level.value) {
              <option [value]="level.value">{{ level.label }}</option>
            }
          </select>
        </div>

        <!-- Labels -->
        <div class="form-control">
          <label class="label">
            <span class="task-field-label">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5 text-base-content/50"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"
                />
              </svg>
              Labels
            </span>
          </label>
          @if (currentTask.labels.length > 0) {
            <div class="flex flex-wrap gap-1.5 mb-2">
              @for (label of currentTask.labels; track label) {
                <span class="badge badge-neutral gap-1 pr-1">
                  {{ label }}
                  <button
                    type="button"
                    class="hover:text-error transition-colors"
                    (click)="removeLabel(label)"
                    [attr.aria-label]="'Remove label ' + label"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="w-3 h-3"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                      stroke-width="2.5"
                      aria-hidden="true"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M6 18L18 6M6 6l12 12"
                      />
                    </svg>
                  </button>
                </span>
              }
            </div>
          }
          <input
            type="text"
            class="input input-bordered w-full"
            placeholder="Type a label and press Enter"
            #labelInput
            (keydown.enter)="addLabel(labelInput.value); labelInput.value = ''"
            (keydown.comma)="addLabel(labelInput.value); labelInput.value = ''"
          />
        </div>

        <!-- Static: Start & End Time & Frequenzy -->
        @if (mode === 'static') {
          <div class="flex gap-3">
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5 text-base-content/50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                  Start Date <span class="text-error">*</span>
                </span>
              </label>
              <input
                type="date"
                class="input input-bordered w-full"
                [(ngModel)]="staticTask.startDate"
              />
            </div>
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">Time</span>
              </label>
              <input
                type="time"
                class="input input-bordered w-full"
                [(ngModel)]="staticTask.startTime"
              />
            </div>
          </div>

          <div class="flex gap-3">
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5 text-base-content/50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                  End Date <span class="text-error">*</span>
                </span>
              </label>
              <input
                type="date"
                class="input input-bordered w-full"
                [(ngModel)]="staticTask.endDate"
              />
            </div>
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">Time</span>
              </label>
              <input
                type="time"
                class="input input-bordered w-full"
                [(ngModel)]="staticTask.endTime"
              />
            </div>
          </div>
          <!--Frequenzy-->
          <div class="form-control">
              <app-repetition-field
              [value]="staticTask.rrule"
              [dtstart]="getTaskStartDate()"
              (valueChange)="onRruleChange($event)"
              ></app-repetition-field>
          </div>
        }

        <!-- Planned: Extra Fields -->
        @if (mode === 'planned') {
          <!-- Dates -->
          <div class="flex gap-3">
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5 text-base-content/50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                  Start Date <span class="text-error">*</span>
                </span>
              </label>
              <input
                type="date"
                class="input input-bordered w-full"
                [(ngModel)]="dynamicTask.startDate"
              />
            </div>
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5 text-base-content/50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
                  Due Date <span class="text-error">*</span>
                </span>
              </label>
              <input
                type="date"
                class="input input-bordered w-full"
                [(ngModel)]="dynamicTask.dueDate"
              />
            </div>
          </div>

          <!-- Duration -->
          <div class="flex gap-3">
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5 text-base-content/50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                  Duration (minutes)
                </span>
              </label>
              <input
                type="number"
                class="input input-bordered w-full"
                min="1"
                [(ngModel)]="dynamicTask.duration"
              />
            </div>
          </div>

          <!-- Session Scope Duration -->
          <div class="flex gap-3">
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5 text-base-content/50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                  Min Scope Duration (min)
                </span>
              </label>
              <input
                type="number"
                class="input input-bordered w-full"
                min="1"
                [(ngModel)]="dynamicTask.minScopeDuration"
              />
            </div>
            <div class="form-control flex-1">
              <label class="label">
                <span class="task-field-label">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5 text-base-content/50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                  Max Scope Duration (min)
                </span>
              </label>
              <input
                type="number"
                class="input input-bordered w-full"
                [min]="dynamicTask.minScopeDuration"
                [(ngModel)]="dynamicTask.maxScopeDuration"
              />
            </div>
          </div>
        }
      </div>

      <!-- Footer -->
      <div class="task-footer">
        <button type="button" class="btn btn-ghost" (click)="close()" [disabled]="isSaving()">
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-primary"
          (click)="submit()"
          [disabled]="!isValid || isSaving()"
        >
          @if (isSaving()) {
            <span class="loading loading-spinner loading-sm"></span>
            Saving...
          } @else {
            {{ isEditing ? 'Update Task' : 'Create Task' }}
          }
        </button>
      </div>
    </div>
  </div>
}
