<label class="label">
      <span class="label-text flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Frequenzy
      </span>
    </label>

    <div class="relative cursor-pointer" (click)="openModal()">
      <input type="text" readonly [value]="displayText"
             class="input input-bordered w-full cursor-pointer pr-10" />
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 opacity-50 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

    <dialog class="modal" [class.modal-open]="isOpen">
      <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">Frequenzy</h3>

        <div class="space-y-4">
          <div class="form-control">
            <label class="label"><span class="label-text">Frequency</span></label>
            <select class="select select-bordered w-full" [(ngModel)]="config.frequency">
              <option value="none">No repetition</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </div>

          <div class="form-control" *ngIf="config.frequency !== 'none'">
            <label class="label"><span class="label-text">Every</span></label>
            <div class="flex items-center gap-2">
              <input type="number" min="1" class="input input-bordered w-20" [(ngModel)]="config.interval" />
              <span class="text-sm opacity-70">
                {{ config.frequency === 'daily' ? 'day(s)' : config.frequency === 'weekly' ? 'week(s)' : 'month(s)' }}
              </span>
            </div>
          </div>

          <div class="form-control" *ngIf="config.frequency === 'weekly'">
            <label class="label"><span class="label-text">On days</span></label>
            <div class="flex gap-2 flex-wrap">
              <button *ngFor="let day of weekDays" type="button" class="btn btn-sm"
                      [class.btn-primary]="config.weekdays.includes(day.value)"
                      [class.btn-outline]="!config.weekdays.includes(day.value)"
                      (click)="toggleWeekday(day.value)">
                {{ day.label }}
              </button>
            </div>
          </div>
        </div>

        <div class="modal-action">
          <button class="btn btn-ghost" (click)="closeModal()">Cancel</button>
          <button class="btn btn-primary" (click)="apply()">Apply</button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop" (click)="closeModal()"><button>close</button></form>
    </dialog>
