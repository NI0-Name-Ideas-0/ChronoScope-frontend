@if (open()) {
  <!-- Backdrop -->
  <div
    class="settings-backdrop"
    [class.settings-backdrop--leaving]="isLeaving()"
    role="dialog"
    aria-modal="true"
    aria-label="Settings"
    (click)="onBackdropClick($event)"
    (keydown)="onKeydown($event)"
    tabindex="-1"
  >
    <!-- Modal panel -->
    <div class="settings-panel" [class.settings-panel--leaving]="isLeaving()" role="document">

      <!-- Header -->
      <div class="settings-header">
        <div class="flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-base-content/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <h1 class="text-base font-semibold text-base-content">Settings</h1>
        </div>
        <button
          class="btn btn-ghost btn-sm btn-circle"
          type="button"
          (click)="close()"
          aria-label="Close settings"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Body: sidebar + content -->
      <div class="settings-body">

        <!-- Sidebar -->
        <nav class="settings-sidebar" aria-label="Settings categories">
          <ul class="space-y-0.5">
            @for (item of navItems; track item.id) {
              <li>
                <button
                  type="button"
                  class="settings-nav-item"
                  [class.settings-nav-item--active]="activeCategory() === item.id"
                  (click)="activeCategory.set(item.id)"
                  [attr.aria-current]="activeCategory() === item.id ? 'page' : null"
                >
                  <span [innerHTML]="item.icon | safeHtml"></span>
                  <span>{{ item.label }}</span>
                </button>
              </li>
            }
          </ul>
        </nav>

        <!-- Content area -->
        <main class="settings-content" tabindex="-1">
          @switch (activeCategory()) {
            @case ('account') {
              <app-settings-account-security />
            }
            @case ('appearance') {
              <app-settings-appearance />
            }
            @case ('organizations') {
              <app-settings-organizations />
            }
            @case ('work') {
              <app-settings-work-preferences />
            }
            @case ('notifications') {
              <app-settings-notifications />
            }
            @case ('privacy') {
              <app-settings-data-privacy />
            }
          }
        </main>

      </div>
    </div>
  </div>
}
