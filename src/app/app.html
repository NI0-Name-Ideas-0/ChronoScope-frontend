<main class="main flex flex-col h-full">
  <app-topbar></app-topbar>
  <div class="flex-1 flex items-stretch">
    <div>
      <app-navbar (settingsRequested)="openSettings()"></app-navbar>
    </div>
    <!--Container for the switching Views-->
      @if (viewService.calendarView && viewService.listView) {
        <!--SplitView-->
        <div class="bg-base-100 flex-1 flex flex-row items-stretch rounded-md p-1.5 gap-2">
          <div class="w-[30%] min-w-0 flex flex-col overflow-hidden">
            <app-list-view class="block w-full h-full overflow-auto"></app-list-view>
          </div>
          <div class="w-[70%] min-w-0 flex flex-col overflow-hidden">
            <app-calendar-view class="block w-full h-full overflow-auto"></app-calendar-view>
          </div>
        </div>
      }
      @else if(viewService.listView){
        <!--ListView-->
          <div class="bg-base-100 flex-1 rounded-md p-1.5">
            <app-list-view></app-list-view>
          </div>
        }
      @else if (viewService.calendarView){
        <!--CalendarView-->
          <div class="bg-base-100 flex-1 rounded-md p-1.5">
            <app-calendar-view></app-calendar-view>
          </div>
        }
  </div>

<router-outlet />
</main>
<app-task-modal></app-task-modal>
<app-settings-modal [open]="isSettingsOpen()" (closed)="closeSettings()" />
